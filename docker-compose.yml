version: '3.8'

services:
  # Main Virtual ICU Streamlit application
  virtual-icu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: virtual-icu-app
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./streamlit_app:/app/streamlit_app
    networks:
      - icu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: PostgreSQL database for future use
  postgres:
    image: postgres:15-alpine
    container_name: virtual-icu-db
    environment:
      POSTGRES_USER: ${DB_USER:-icu_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-icu_password}
      POSTGRES_DB: ${DB_NAME:-virtual_icu}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - icu-network
    profiles:
      - optional
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icu_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  icu-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
